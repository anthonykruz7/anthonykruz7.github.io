<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Pillar Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://bundle.run/buffer@6.0.3"></script>
    <style>
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body
    class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center p-4 selection:bg-blue-500 selection:text-white">

    <nav class="w-full max-w-4xl flex justify-between items-center mb-12 mt-4">
        <a href="index.html" class="text-slate-400 hover:text-white transition-colors flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
            </svg>
            Back to Home
        </a>
        <h1 class="text-xl font-bold text-blue-400">Student Portal</h1>
    </nav>

    <div class="w-full max-w-lg glass p-8 rounded-2xl shadow-2xl mb-8 border-t-4 border-blue-500">
        <header class="text-center mb-8">
            <h2 class="text-2xl font-bold text-white">Access Your Certificate</h2>
            <p class="text-slate-400 text-sm mt-1">Decrypt and download your verified credential.</p>
        </header>

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Credential ID</label>
                <input id="credID" type="text" placeholder="e.g. ZUBBY-CERT-01"
                    class="w-full p-4 rounded bg-slate-950 border border-slate-700 outline-none focus:border-blue-500 transition-all font-mono">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Your Private Key (Hex)</label>
                <input id="privKey" type="password" placeholder="The key generated during enrollment"
                    class="w-full p-4 rounded bg-slate-950 border border-slate-700 outline-none focus:border-blue-500 transition-all font-mono text-xs">
            </div>
            <button id="claimBtn"
                class="w-full bg-blue-600 hover:bg-blue-500 p-4 rounded font-bold transition-all shadow-lg active:scale-95 disabled:opacity-50">
                Verify & Decrypt Certificate
            </button>
        </div>

        <div id="statusLog" class="mt-6 text-[10px] font-mono text-slate-500 text-center h-4 uppercase tracking-widest">
        </div>

        <div id="result" class="hidden mt-8 p-6 bg-green-900/20 border border-green-500 rounded text-center">
            <p class="text-green-400 font-bold mb-4">✓ Identity & Integrity Validated</p>
            <a id="downloadLink"
                class="inline-block bg-green-600 px-8 py-3 rounded text-white font-bold hover:bg-green-500 transition-colors shadow-lg">
                Download Decrypted PDF
            </a>
        </div>
    </div>

    <!-- Identity Generator Tool -->
    <div class="w-full max-w-lg glass p-6 rounded-xl border border-slate-700/50">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-sm font-bold text-slate-400 uppercase">Need Keys?</h3>
            <button id="genKeys" class="text-blue-400 text-xs hover:underline">Generate New Identity</button>
        </div>
        <div id="keyDisplay"
            class="hidden p-4 bg-slate-950 border border-blue-500/30 rounded text-[10px] font-mono break-all space-y-2">
            <p class="text-blue-400 font-bold underline text-center">SAVE THESE SECURELY</p>
            <p><span class="text-slate-500">PUBLIC KEY (Share with Uni):</span><br><span id="pubOut"
                    class="text-slate-300 select-all"></span></p>
            <p><span class="text-slate-500">PRIVATE KEY (Keep Secret):</span><br><span id="privOut"
                    class="text-red-400 select-all"></span></p>
        </div>
    </div>

    <script type="module">
        import * as eccryptoJS from 'https://esm.sh/eccrypto-js@5.4.0';
        window.Buffer = buffer.Buffer;

        const API_URL = (window.location.port === '3000')
            ? ''
            : 'http://127.0.0.1:3000';

        const h2u = (hex) => Buffer.from(hex, 'hex');
        const logStatus = (msg) => { document.getElementById('statusLog').innerText = `[LOG]: ${msg}`; };

        // 1. Generate Identity
        document.getElementById('genKeys').addEventListener('click', async () => {
            const privateKey = eccryptoJS.generatePrivate();
            const publicKey = eccryptoJS.getPublic(privateKey);
            document.getElementById('pubOut').innerText = Buffer.from(publicKey).toString('hex');
            document.getElementById('privOut').innerText = Buffer.from(privateKey).toString('hex');
            document.getElementById('keyDisplay').classList.remove('hidden');
        });

        // 2. Decrypt Logic
        document.getElementById('claimBtn').addEventListener('click', async () => {
            // ... (lines 102-114) ...
            const id = document.getElementById('credID').value.trim();
            const rawKey = document.getElementById('privKey').value.trim();
            const claimBtn = document.getElementById('claimBtn');
            const resultDiv = document.getElementById('result');

            if (!id || !rawKey) return alert("All fields required.");

            resultDiv.classList.add('hidden');
            claimBtn.disabled = true;
            logStatus("Querying Blockchain Ledger...");

            try {
                // Fetch blockchain record
                const res = await fetch(`${API_URL}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credentialID: id })
                });
                const data = await res.json();
                if (!data.success) throw new Error("ID not found on Ledger.");

                // Fetch from IPFS
                logStatus("Pulling Envelope from IPFS...");
                let ipfsData;
                const cid = data.record.ipfsCID || data.record.ipfsCid;
                try {
                    console.log("Attempting to fetch from Pinata gateway for CID:", cid);
                    const ipfsRes = await fetch(`https://gateway.pinata.cloud/ipfs/${cid}`);
                    if (!ipfsRes.ok) {
                        throw new Error(`Pinata gateway responded with status: ${ipfsRes.status}`);
                    }
                    ipfsData = await ipfsRes.json();
                } catch (e) {
                    console.warn("Pinata gateway retrieval failed, falling back to local backend:", e);
                    const localUrl = `${API_URL}/ipfs/${cid}`;
                    console.log("Attempting to fetch from local backend url:", localUrl);
                    const ipfsRes = await fetch(localUrl);
                    if (!ipfsRes.ok) {
                        throw new Error(`Local backend also failed to retrieve CID: ${ipfsRes.status}`);
                    }
                    ipfsData = await ipfsRes.json();
                }
                const encrypted = data.record.encryptedData || ipfsData; // Logic adjustment if needed

                // Decrypt
                logStatus("Decrypting Payload...");
                // Note: ipfsData structure {iv, epk, ct, mac} matches standard
                const opts = {
                    iv: h2u(ipfsData.iv),
                    ephemPublicKey: h2u(ipfsData.epk),
                    ciphertext: h2u(ipfsData.ct),
                    mac: h2u(ipfsData.mac)
                };

                const decryptedBuffer = await eccryptoJS.decrypt(h2u(rawKey), opts);

                // Convert to Base64 -> PDF Blob
                const base64String = Buffer.from(decryptedBuffer).toString();
                const binaryString = window.atob(base64String); // Browser-native atob
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                const blob = new Blob([bytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);

                const dl = document.getElementById('downloadLink');
                dl.href = url;
                const issuer = data.record.issuerName || 'Certificate';
                dl.download = `${issuer}_${id}.pdf`;

                resultDiv.classList.remove('hidden');
                logStatus("System Reform Complete.");
                // ...
                console.error("DECRYPTION ERROR:", err);
                logStatus(`FAILURE: ${err.message}`);
                alert("Decryption Error: Key mismatch or invalid data.");
            } finally {
                claimBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
