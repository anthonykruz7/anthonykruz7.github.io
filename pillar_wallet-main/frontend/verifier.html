<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifier Portal - Pillar Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://bundle.run/buffer@6.0.3"></script>
    <style>
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body
    class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center p-4 selection:bg-purple-500 selection:text-white">

    <nav class="w-full max-w-4xl flex justify-between items-center mb-12 mt-4">
        <a href="index.html" class="text-slate-400 hover:text-white transition-colors flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
            </svg>
            Back to Home
        </a>
        <h1 class="text-xl font-bold text-purple-400">Verifier Portal</h1>
    </nav>

    <div class="w-full max-w-lg glass p-8 rounded-2xl shadow-2xl mb-8 border-t-4 border-purple-500">
        <header class="text-center mb-8">
            <h2 class="text-2xl font-bold text-white">Employer Verification</h2>
            <p class="text-slate-400 text-sm mt-1">Audit the integrity and authenticity of credentials.</p>
        </header>

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Original PDF Document</label>
                <input id="verifyFile" type="file" accept="application/pdf"
                    class="w-full text-sm text-slate-300 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-purple-600 file:text-white hover:file:bg-purple-700 cursor-pointer" />
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Credential ID</label>
                <input id="verifyCredID" type="text" placeholder="e.g. ZUBBY-CERT-01"
                    class="w-full p-4 rounded bg-slate-950 border border-slate-700 outline-none focus:border-purple-500 transition-all font-mono">
            </div>
            <button id="verifyBtn"
                class="w-full bg-purple-600 hover:bg-purple-500 p-4 rounded font-bold transition-all shadow-lg active:scale-95 disabled:opacity-50">
                Audit Integrity & Authenticity
            </button>
        </div>

        <div id="verifyLog" class="mt-6 text-[10px] font-mono text-slate-500 text-center h-4 uppercase tracking-widest">
        </div>
        <div id="verifyResult" class="hidden mt-6 p-4 rounded border text-center"></div>

    </div>

    <script type="module">
        import * as eccryptoJS from 'https://esm.sh/eccrypto-js@5.4.0';
        window.Buffer = buffer.Buffer;

        const verifyLog = document.getElementById('verifyLog');
        const verifyBtn = document.getElementById('verifyBtn');
        const verifyResult = document.getElementById('verifyResult');

        const logVerify = (msg) => { verifyLog.innerText = `[AUDIT]: ${msg}`; };

        verifyBtn.addEventListener('click', async () => {
            const id = document.getElementById('verifyCredID').value.trim();
            const fileInput = document.getElementById('verifyFile');

            if (!id || !fileInput.files[0]) return alert("Please provide both Credential ID and PDF file.");

            verifyBtn.disabled = true;
            verifyResult.className = "hidden mt-6 p-4 rounded border text-center";
            logVerify("Computing Local Hash...");

            try {
                // 1. Calculate Local Hash (SHA-256)
                const fileBuffer = await fileInput.files[0].arrayBuffer();
                const hashBuffer = await crypto.subtle.digest('SHA-256', fileBuffer);
                const localHash = Buffer.from(hashBuffer).toString('hex');

                logVerify("Fetching Blockchain Record...");
                // 2. Fetch Blockchain Record
                const res = await fetch('http://127.0.0.1:3000/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credentialID: id })
                });
                const data = await res.json();
                if (!data.success) throw new Error("Record not found.");

                logVerify("Auditing Cryptographic Proofs...");

                // 3. Compare Hashes
                if (localHash !== data.record.pdfHash) {
                    throw new Error("INTEGRITY FAILED: File content does not match blockchain hash.");
                }

                // 4. Verify Signature
                const issuerKey = Buffer.from(data.issuerPublicKey, 'hex');
                const signatureRaw = Buffer.from(data.record.issuerSignature, 'hex');
                const msgHash = Buffer.from(data.record.pdfHash, 'hex');

                await eccryptoJS.verify(issuerKey, msgHash, signatureRaw);

                // Success
                verifyResult.innerHTML = `
                    <p class="text-green-400 font-bold text-lg">✓ VERIFIED AUTHENTIC</p>
                    <p class="text-slate-400 text-xs mt-2">Integrity: <span class="text-green-500">MATCH</span></p>
                    <p class="text-slate-400 text-xs">Issuer Signature: <span class="text-green-500">VALID</span></p>
                    <p class="text-slate-500 text-[10px] mt-2 font-mono break-all">Hash: ${localHash}</p>
                `;
                verifyResult.className = "mt-6 p-4 rounded border border-green-500 bg-green-900/20 text-center";
                logVerify("Audit Passed.");

            } catch (err) {
                console.error(err);
                verifyResult.innerHTML = `
                        <p class="text-red-400 font-bold text-lg">✕ VERIFICATION FAILED</p>
                        <p class="text-slate-400 text-xs mt-2">${err.message}</p>
                    `;
                verifyResult.className = "mt-6 p-4 rounded border border-red-500 bg-red-900/20 text-center";
                logVerify("Audit Failed.");
            } finally {
                verifyBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
